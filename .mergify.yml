priority_rules:
  - name: high priority
    conditions:
      - label = urgent
    priority: high
    allow_checks_interruption: true
queue_rules:
  - name: urgent
    batch_size: 1
    queue_conditions:
      - base=main
      - label=urgent
      - "-label‾=^autorelease:"
      - check-success‾=^Build
      - check-success‾=^Test
      - -draft
    merge_method: squash
    update_method: rebase
    update_bot_account: henry-hsieh
  - name: default
    batch_size: 1
    queue_conditions:
      - base=main
      - -label=urgent
      - "-label‾=^autorelease:"
      - check-success‾=^Build
      - check-success‾=^Test
      - -draft
    merge_method: squash
    update_method: rebase
    update_bot_account: henry-hsieh
merge_queue:
  max_parallel_checks: 1
merge_protections_settings:
  auto_merge: true
