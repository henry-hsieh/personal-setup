name: fisher
version: 4.4.8
datasource: github-releases
package: jorgebucaran/fisher
files:
  - src: https://raw.githubusercontent.com/jorgebucaran/fisher/refs/tags/{version}/functions/fisher.fish
    dst: .config/fish/functions/fisher.fish
  - src: https://raw.githubusercontent.com/jorgebucaran/fisher/refs/tags/{version}/completions/fisher.fish
    dst: .config/fish/completions/fisher.fish
init_cmds:
  - fish -c "fisher update"
  - fish -c "tide configure --auto --style=Rainbow --prompt_colors='16 colors' --show_time='24-hour format' --rainbow_prompt_separators=Angled --powerline_prompt_heads=Sharp --powerline_prompt_tails=Flat --powerline_prompt_style='Two lines, character and frame' --prompt_connection=Disconnected --powerline_right_prompt_frame=Yes --prompt_spacing=Sparse --icons='Many icons'"
test:
  type: cmd
  cmd: fish -c 'fisher --version'
